name: Post-Deployment Verification

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed

jobs:
  verify-deployment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Wait for deployment propagation
        run: sleep 60
        
      - name: Verify site accessibility
        run: |
          echo "Checking site accessibility..."
          SITE_URL="https://modelviewer.wecanuseai.com"
          
          # Check if site is accessible
          if curl -f -s -o /dev/null "$SITE_URL"; then
            echo "✓ Site is accessible at $SITE_URL"
          else
            echo "✗ Site is not accessible at $SITE_URL"
            exit 1
          fi
          
      - name: Verify critical resources
        run: |
          SITE_URL="https://modelviewer.wecanuseai.com"
          
          # Check for main JavaScript bundle
          if curl -f -s -o /dev/null "$SITE_URL/main.*.js" || curl -f -s -o /dev/null "$SITE_URL/bundle.js"; then
            echo "✓ Main JavaScript bundle found"
          else
            echo "✗ Main JavaScript bundle not found"
            exit 1
          fi
          
          # Check for CSS
          if curl -f -s -o /dev/null "$SITE_URL/styles.css"; then
            echo "✓ CSS file found"
          else
            echo "✗ CSS file not found"
            exit 1
          fi
          
          # Check for manifest
          if curl -f -s -o /dev/null "$SITE_URL/manifest.json"; then
            echo "✓ PWA manifest found"
          else
            echo "✗ PWA manifest not found"
            exit 1
          fi
          
      - name: Performance check
        run: |
          echo "Running basic performance check..."
          SITE_URL="https://modelviewer.wecanuseai.com"
          
          # Measure response time
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}' "$SITE_URL")
          echo "Response time: ${RESPONSE_TIME}s"
          
          # Check if response time is reasonable (under 5 seconds)
          if (( $(echo "$RESPONSE_TIME < 5.0" | bc -l) )); then
            echo "✓ Response time is acceptable"
          else
            echo "⚠️ Response time is slow (${RESPONSE_TIME}s)"
          fi

  notify-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Notify deployment failure
        run: |
          echo "❌ Deployment workflow failed"
          echo "Check the deployment logs for details"
          echo "Workflow run: ${{ github.event.workflow_run.html_url }}"