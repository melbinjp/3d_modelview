name: Deployment Status Notifications

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages", "Post-Deployment Verification"]
    types:
      - completed

jobs:
  notify-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Generate deployment report
        run: |
          echo "# Deployment Status Report" > deployment-report.md
          echo "" >> deployment-report.md
          echo "**Workflow:** ${{ github.event.workflow_run.name }}" >> deployment-report.md
          echo "**Status:** ${{ github.event.workflow_run.conclusion }}" >> deployment-report.md
          echo "**Commit:** ${{ github.event.workflow_run.head_sha }}" >> deployment-report.md
          echo "**Branch:** ${{ github.event.workflow_run.head_branch }}" >> deployment-report.md
          echo "**Triggered by:** ${{ github.event.workflow_run.triggering_actor.login }}" >> deployment-report.md
          echo "**Run URL:** ${{ github.event.workflow_run.html_url }}" >> deployment-report.md
          echo "" >> deployment-report.md
          
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "✅ **Deployment successful!**" >> deployment-report.md
            echo "" >> deployment-report.md
            echo "The 3D Model Viewer Pro is now live at:" >> deployment-report.md
            echo "🌐 https://modelviewer.wecanuseai.com" >> deployment-report.md
          else
            echo "❌ **Deployment failed!**" >> deployment-report.md
            echo "" >> deployment-report.md
            echo "Please check the workflow logs for details." >> deployment-report.md
          fi
          
          cat deployment-report.md
          
      - name: Create deployment issue on failure
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Deployment Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Deployment Failure Report
            
            **Workflow:** ${{ github.event.workflow_run.name }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Run URL:** ${{ github.event.workflow_run.html_url }}
            
            ### Action Required
            - [ ] Review workflow logs
            - [ ] Fix deployment issues
            - [ ] Re-run deployment
            - [ ] Verify site functionality
            
            ### Troubleshooting Steps
            1. Check build logs for compilation errors
            2. Verify all required files are present in dist/
            3. Test deployment locally with \`npm run build:production\`
            4. Check GitHub Pages settings
            5. Verify CNAME configuration
            
            This issue will be automatically closed when deployment succeeds.
            `;
            
            // Check if there's already an open deployment issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['deployment-failure']
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deployment-failure', 'bug', 'high-priority']
              });
            }
            
      - name: Close deployment issues on success
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            // Close any open deployment failure issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['deployment-failure']
            });
            
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ Deployment has been fixed and is now successful. Closing this issue.'
              });
            }